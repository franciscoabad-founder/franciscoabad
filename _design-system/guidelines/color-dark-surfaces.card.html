<!-- @dsCard group="Colors" viewport="700x170" name="Dark surfaces (default mode)" subtitle="Ink ground, Royal elevated. Dark is the default for all public work" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--bg-base); font-family: var(--font-sans); padding: 24px; }
  .row { display: flex; gap: 14px; }
  .sw { flex: 1; border-radius: var(--radius-card); padding: 16px; min-height: 96px; display: flex; flex-direction: column; justify-content: space-between; border: 1px solid var(--border-subtle); }
  .name { font-weight: 700; font-size: 13px; color: #fff; }
  .hex { font-weight: 500; font-size: 11px; color: var(--white-64); letter-spacing: 0.04em; }
  .use { font-size: 11px; color: var(--text-muted); }
</style>
</head>
<body>
  <div class="row">
    <div class="sw" style="background: var(--bg-sunken);">
      <div><div class="name">Sunken</div><div class="hex">#0A1029</div></div><div class="use">Deepest wells</div>
    </div>
    <div class="sw" style="background: var(--ink);">
      <div><div class="name">Ink</div><div class="hex">#0E1738</div></div><div class="use">Base · hero · slides</div>
    </div>
    <div class="sw" style="background: var(--royal);">
      <div><div class="name">Royal</div><div class="hex">#1A2B6B</div></div><div class="use">Cards · elevated</div>
    </div>
    <div class="sw" style="background: var(--charcoal);">
      <div><div class="name">Charcoal</div><div class="hex">#1A1A1A</div></div><div class="use">Dark footer</div>
    </div>
  </div>
</body>
</html>
