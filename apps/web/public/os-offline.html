<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sin conexion — OS</title>
    <meta name="robots" content="noindex, nofollow" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        background: #0E1738;
        color: #F4F6F8;
        font-family: system-ui, sans-serif;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 2rem;
      }
      .wrap { max-width: 320px; }
      .dot {
        width: 9px; height: 9px; border-radius: 50%;
        background: #6B7280; display: inline-block; margin-bottom: 1.25rem;
      }
      h1 { font-size: 1.125rem; font-weight: 700; margin-bottom: 0.5rem; }
      p { font-size: 0.875rem; color: #6B7280; line-height: 1.5; margin-bottom: 1.5rem; }
      a {
        display: inline-block; background: #3B4ED9; color: #fff; text-decoration: none;
        padding: 0.625rem 1.25rem; border-radius: 6px; font-size: 0.8125rem; font-weight: 600;
        letter-spacing: 0.04em;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <span class="dot"></span>
      <h1>Sin conexion</h1>
      <p>El OS necesita red para sincronizar con el cerebro. Reconecta y vuelve a intentar.</p>
      <a href="/os">Reintentar</a>
    </div>
  </body>
</html>
