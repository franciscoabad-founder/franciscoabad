<!-- @dsCard group="Colors" viewport="700x180" name="Accent · Ultramarine" subtitle="Primary accent: CTAs, links, accent titles, highlights" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--bg-base); font-family: var(--font-sans); padding: 24px; }
  .row { display: flex; gap: 16px; }
  .sw { flex: 1; border-radius: var(--radius-card); padding: 16px; display: flex; flex-direction: column; justify-content: space-between; min-height: 104px; border: 1px solid var(--border-subtle); }
  .name { font-weight: 700; font-size: 14px; }
  .hex { font-weight: 500; font-size: 12px; opacity: 0.7; letter-spacing: 0.04em; }
  .use { font-size: 11px; opacity: 0.6; line-height: 1.4; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw" style="background: var(--ultramarine); color: #fff;">
      <div><div class="name">Ultramarine</div><div class="hex">#3B4ED9</div></div>
      <div class="use">Primary accent · CTAs · links</div>
    </div>
    <div class="sw" style="background: var(--ultra-light); color: var(--ink);">
      <div><div class="name">Ultra-light</div><div class="hex">#6B7AE8</div></div>
      <div class="use">Hover state of Ultramarine</div>
    </div>
    <div class="sw" style="background: var(--ultramarine-24); color: #fff;">
      <div><div class="name">Ultramarine 24%</div><div class="hex">rgba(59,78,217,.24)</div></div>
      <div class="use">Tints · borders · focus on dark</div>
    </div>
  </div>
</body>
</html>
