<!-- @dsCard group="Type" viewport="700x230" name="Display & hero" subtitle="Gotham Black/Bold, tight tracking, large scale" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--bg-base); font-family: var(--font-sans); padding: 28px 32px; color: #fff; }
  .meta { font-size: 11px; color: var(--text-muted); letter-spacing: 0.04em; margin-bottom: 6px; }
  .hero { font-weight: 900; font-size: 56px; line-height: 1.08; letter-spacing: -0.02em; margin: 0 0 18px; }
  .accent { color: var(--ultramarine); }
  .display { font-weight: 700; font-size: 34px; line-height: 1.12; letter-spacing: -0.02em; margin: 0; }
</style>
</head>
<body>
  <div class="meta">Hero · Black 900 · clamp 44–80px · tracking -0.02em</div>
  <h1 class="hero">Vuelvo alcanzable <span class="accent">lo imposible.</span></h1>
  <div class="meta">Display · Bold 700 · 36–56px</div>
  <h2 class="display">Construyo desde adentro, codo a codo.</h2>
</body>
</html>
