<!-- @dsCard group="Spacing" viewport="700x180" name="Spacing scale" subtitle="4px base · generous editorial whitespace" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--bg-base); font-family: var(--font-sans); padding: 24px 32px; color: #fff; }
  .row { display: flex; align-items: center; gap: 12px; margin-bottom: 9px; }
  .bar { background: var(--ultramarine); height: 16px; border-radius: 3px; }
  .lab { font-size: 11px; color: var(--white-64); width: 120px; flex: none; }
</style>
</head>
<body>
  <div class="row"><div class="bar" style="width:4px"></div><span class="lab">1 · 4px</span></div>
  <div class="row"><div class="bar" style="width:8px"></div><span class="lab">2 · 8px</span></div>
  <div class="row"><div class="bar" style="width:16px"></div><span class="lab">4 · 16px</span></div>
  <div class="row"><div class="bar" style="width:32px"></div><span class="lab">6 · 32px</span></div>
  <div class="row"><div class="bar" style="width:64px"></div><span class="lab">8 · 64px</span></div>
  <div class="row"><div class="bar" style="width:128px"></div><span class="lab">10 · 128px</span></div>
</body>
</html>
