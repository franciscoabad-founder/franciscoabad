<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--bg-base); font-family: var(--font-sans); padding: 24px 32px; color: #fff; display: flex; gap: 40px; align-items: center; }
  .m { text-align: left; }
  .num { font-weight: 900; font-size: 60px; line-height: 1; color: var(--champagne); font-variant-numeric: tabular-nums; letter-spacing: -0.01em; }
  .num.sm { font-size: 40px; }
  .lab { color: var(--white-64); font-size: 12px; margin-top: 8px; max-width: 18ch; }
</style>
</head>
<body>
  <div class="m"><div class="num">+32.000</div><div class="lab">empleados bajo liderazgo en el IESS</div></div>
  <div class="m"><div class="num sm">$10.000M</div><div class="lab">presupuesto administrado</div></div>
  <div class="m"><div class="num sm">+15</div><div class="lab">países con presencia</div></div>
</body>
</html>
