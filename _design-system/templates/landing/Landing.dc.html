<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<!-- @template name="Brand Landing" description="Personal-brand hero landing in Ultramarine v5 dark, with proof metrics and CTAs" -->
<helmet>
  <script src="./ds-base.js"></script>
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; }
  </style>
</helmet>
<div style="min-height: 100vh; background: var(--bg-base); font-family: var(--font-sans); -webkit-font-smoothing: antialiased; padding: 64px 32px;">
  <div style="max-width: 1200px; margin: 0 auto;">

    <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 80px;">
      <x-import component-from-global-scope="FranciscoAbadUltramarineDesignSystem_a2998e.Logo" layout="horizontal" size="{{ logoSize }}" tone="dark" hint-size="180px,40px"></x-import>
      <x-import component-from-global-scope="FranciscoAbadUltramarineDesignSystem_a2998e.Button" variant="secondary" size="sm" hint-size="120px,40px">Hablemos</x-import>
    </div>

    <div style="display: grid; grid-template-columns: 1.35fr 1fr; gap: 72px; align-items: center;">
      <div>
        <h1 style="font-family: var(--font-sans); font-weight: 900; font-size: var(--fs-hero); line-height: 1.05; letter-spacing: -0.025em; color: var(--text-primary); margin: 0 0 24px; text-wrap: balance;">Vuelvo alcanzable lo imposible.</h1>
        <p style="font-family: var(--font-sans); font-weight: 400; font-size: var(--fs-body-lg); line-height: 1.6; color: var(--text-secondary); margin: 0 0 28px; max-width: 46ch;">Diseño y opero sistemas que hacen rendir a personas, empresas e instituciones. Desde adentro, codo a codo, con resultados que se miden.</p>
        <div style="display: flex; gap: 16px; flex-wrap: wrap;">
          <x-import component-from-global-scope="FranciscoAbadUltramarineDesignSystem_a2998e.Button" variant="primary" size="lg" hint-size="200px,52px">Trabajemos juntos</x-import>
          <x-import component-from-global-scope="FranciscoAbadUltramarineDesignSystem_a2998e.Button" variant="secondary" size="lg" hint-size="200px,52px">Conoce mi trayectoria</x-import>
        </div>
      </div>
      <div style="display: flex; justify-content: flex-end;">
        <img src="../../assets/images/francisco-abad.webp" alt="Francisco Abad" style="width: 340px; max-width: 38vw; aspect-ratio: 3/4; object-fit: cover; border-radius: var(--radius-lg); box-shadow: var(--shadow-lg);">
      </div>
    </div>

    <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 48px; margin-top: 88px; padding-top: 48px; border-top: 1px solid var(--border-subtle);">
      <x-import component-from-global-scope="FranciscoAbadUltramarineDesignSystem_a2998e.MetricStat" value="32.000" prefix="+" label="empleados bajo liderazgo en el IESS" hint-size="100%,90px"></x-import>
      <x-import component-from-global-scope="FranciscoAbadUltramarineDesignSystem_a2998e.MetricStat" value="18.000" prefix="+" label="emprendedores en +15 países" hint-size="100%,90px"></x-import>
      <x-import component-from-global-scope="FranciscoAbadUltramarineDesignSystem_a2998e.MetricStat" value="36 → 78%" size="sm" label="eficiencia operativa en 6 meses" hint-size="100%,90px"></x-import>
    </div>

  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;: {&quot;width&quot;: 1200, &quot;height&quot;: 760}, &quot;logoSize&quot;: {&quot;editor&quot;: &quot;int&quot;, &quot;default&quot;: 26, &quot;min&quot;: 18, &quot;max&quot;: 40, &quot;tsType&quot;: &quot;number&quot;}}">
class Component extends DCLogic {
  renderVals() {
    return {
      logoSize: this.props.logoSize ?? 26,
    };
  }
}
</script>
</body>
</html>
