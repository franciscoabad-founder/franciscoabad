<!-- @dsCard group="Type" viewport="700x150" name="Labels & eyebrows" subtitle="Medium 500, uppercase, 0.12em tracking · in accent color" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--bg-base); font-family: var(--font-sans); padding: 26px 32px; color: #fff; display: flex; flex-direction: column; gap: 18px; }
  .eyebrow { font-weight: 500; font-size: 12px; text-transform: uppercase; letter-spacing: 0.12em; color: var(--ultramarine); }
  .navlabel { font-weight: 500; font-size: 13px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--white-64); }
  .meta { font-size: 10px; color: var(--text-muted); letter-spacing: 0.04em; }
  .grp { display: flex; flex-direction: column; gap: 4px; }
</style>
</head>
<body>
  <div class="grp"><span class="eyebrow">Empieza aquí</span><span class="meta">Eyebrow · Medium · 12px · 0.12em · accent</span></div>
  <div class="grp"><span class="navlabel">SOBRE MÍ · TRABAJA CONMIGO · BLOG</span><span class="meta">Nav label · Medium · 13px · 0.06em · secondary</span></div>
</body>
</html>
