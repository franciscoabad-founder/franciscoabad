<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--bg-base); font-family: var(--font-sans); padding: 22px 32px; color: #fff; }
  .row { display: flex; align-items: baseline; gap: 16px; padding: 5px 0; border-bottom: 1px solid var(--border-subtle); }
  .row:last-child { border-bottom: none; }
  .w { font-size: 26px; flex: 1; }
  .tag { font-size: 11px; color: var(--text-muted); width: 150px; flex: none; letter-spacing: 0.03em; }
</style>
</head>
<body>
  <div class="row"><span class="w" style="font-weight:100">Francisco</span><span class="tag">Thin 100</span></div>
  <div class="row"><span class="w" style="font-weight:200">Francisco</span><span class="tag">XLight 200 · whisper</span></div>
  <div class="row"><span class="w" style="font-weight:300">Captions</span><span class="tag">Light 300</span></div>
  <div class="row"><span class="w" style="font-weight:400">Body copy</span><span class="tag">Book 400</span></div>
  <div class="row"><span class="w" style="font-weight:500">Labels</span><span class="tag">Medium 500</span></div>
  <div class="row"><span class="w" style="font-weight:700">Headlines</span><span class="tag">Bold 700</span></div>
  <div class="row"><span class="w" style="font-weight:900">IMPACT / ABAD</span><span class="tag">Black 900</span></div>
</body>
</html>
