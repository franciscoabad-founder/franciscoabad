<!-- @dsCard group="Colors" viewport="700x170" name="Neutrals & light mode" subtitle="Linen ground, slate text ramp for documents and web" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--linen); font-family: var(--font-sans); padding: 24px; }
  .row { display: flex; gap: 12px; }
  .sw { flex: 1; border-radius: var(--radius-card); padding: 14px; min-height: 92px; display: flex; flex-direction: column; justify-content: space-between; border: 1px solid var(--slate-light); }
  .name { font-weight: 700; font-size: 12px; }
  .hex { font-weight: 500; font-size: 10px; opacity: 0.7; letter-spacing: 0.03em; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw" style="background: #fff; color: var(--slate-dark);"><div class="name">White</div><div class="hex">#FFFFFF</div></div>
    <div class="sw" style="background: var(--linen); color: var(--slate-dark);"><div class="name">Linen</div><div class="hex">#FAFAF7</div></div>
    <div class="sw" style="background: var(--slate-light); color: var(--slate-dark);"><div class="name">Slate-light</div><div class="hex">#E8EAF0</div></div>
    <div class="sw" style="background: var(--slate-mid); color: #fff;"><div class="name">Slate-mid</div><div class="hex">#6B7280</div></div>
    <div class="sw" style="background: var(--slate-dark); color: #fff;"><div class="name">Slate-dark</div><div class="hex">#2D3748</div></div>
  </div>
</body>
</html>
